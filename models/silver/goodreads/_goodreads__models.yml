# ============================================================================
# _goodreads__models.yml
# ============================================================================
# Documentación + tests sobre los modelos staging de goodreads.
#
# Comando para ejecutar todos los tests de este grupo:
#   dbt test --select silver.goodreads
# ============================================================================

version: 2

models:
  - name: slv__paises
    description: "Tabla de países unificada de datos de Goodreads y OpenLibrary"
    columns:
      - name: id_pais
        description: "Id único y hasheado para cada país"
        data_type: varchar
        data_tests:
          - unique
          - not_null
      
      - name: pais
        description: "Nombre del país"
        data_type: varchar
        data_tests:
          - unique

  - name: slv_goodreads__generos
    description: ""
    columns:
      - name: id_genero
        data_type: varchar
        description: ""
        data_tests:
          - unique
          - not_null
          
      - name: genero
        data_type: varchar
        description: ""

  - name: slv_goodreads__resenyas
    description: "Tabla con reseñas de Goodreads"
    columns:
      - name: user_id
        data_type: varchar
        description: ""

      - name: isbn
        data_type: varchar
        description: ""

      - name: valoracion
        data_type: number
        description: ""

      - name: descripcion_valoracion
        data_type: varchar
        description: ""

      - name: created_at
        data_type: date
        description: ""

      - name: last_modified
        data_type: date
        description: ""

  - name: slv_goodreads__usuarios
    description: "Tabla de usuarios de Goodreads"
    columns:
      - name: id_usuario
        description: "Id único y hasheado del usuario"
        data_type: varchar        
        data_tests:
          - unique
          - not_null

      - name: id_genero
        data_type: varchar
        description: "Género del usuario"

      - name: edad
        data_type: number
        description: "Edad del usuario"

      - name: id_pais
        data_type: varchar
        description: "Id de país"

      - name: id_provincia
        description: "Id de provincia si el país es España"
        data_type: varchar 

      - name: email
        description: "Email con el que se registró el usuario"
        data_type: varchar
        data_tests:
          - unique
          - not_null
        